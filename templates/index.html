<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GitHub Webhook Events</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1f2937, #111827);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #f9fafb;
    }

    .container {
      width: 90%;
      max-width: 800px;
      background: #1e293b;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      font-weight: 600;
      letter-spacing: 1px;
      color: #38bdf8;
    }

    .event {
      background: #0f172a;
      padding: 15px 20px;
      margin-bottom: 15px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: 0.3s ease;
      border-left: 6px solid #38bdf8;
    }

    .event:hover {
      transform: translateY(-3px);
      background: #111827;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .push {
      background: #2563eb;
    }

    .pull {
      background: #f59e0b;
    }

    .merge {
      background: #10b981;
    }

    .timestamp {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 4px;
    }

    .empty {
      text-align: center;
      color: #9ca3af;
      padding: 20px 0;
    }
  </style>

  <script>
    async function fetchEvents() {
      const res = await fetch('/events');
      const data = await res.json();
      const container = document.getElementById('events');
      container.innerHTML = '';

      if (data.length === 0) {
        container.innerHTML = "<div class='empty'>No events yet...</div>";
        return;
      }

      data.forEach(ev => {
        let message = "";
        let badgeClass = "";

        if (ev.action_type === "PUSH") {
          message = `${ev.author} pushed to ${ev.to_branch}`;
          badgeClass = "push";
        } else if (ev.action_type === "PULL_REQUEST") {
          message = `${ev.author} opened a pull request from ${ev.from_branch} → ${ev.to_branch}`;
          badgeClass = "pull";
        } else if (ev.action_type === "MERGE") {
          message = `${ev.author} merged ${ev.from_branch} → ${ev.to_branch}`;
          badgeClass = "merge";
        }

        const eventDiv = document.createElement('div');
        eventDiv.className = 'event';

        eventDiv.innerHTML = `
          <div>
            <div>${message}</div>
            <div class="timestamp">${new Date(ev.timestamp).toLocaleString()}</div>
          </div>
          <span class="badge ${badgeClass}">${ev.action_type}</span>
        `;

        container.appendChild(eventDiv);
      });
    }

    setInterval(fetchEvents, 15000);
    window.onload = fetchEvents;
  </script>
</head>

<body>
  <div class="container">
    <h2> Recent GitHub Events</h2>
    <div id="events"></div>
  </div>
</body>
</html>
